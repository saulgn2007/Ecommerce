<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería Online</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<header>
    <h1>Librería Lemos</h1>

    <div class="top-right">
        <button id="loginBtn" onclick="abrirLogin()">👤</button>
        <button id="cartBtn" onclick="toggleCarrito()">🛒 <span id="cartCount">0</span></button>
    </div>
</header>

<div id="carritoBox" class="carrito">
    <h3>Carrito</h3>
    <ul id="carritoLista"></ul>
    <p>Total: <span id="total">0</span> €</p>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>Iniciar sesión</h3>
        <input type="text" id="userInput" placeholder="Nombre de usuario">
        <button onclick="login()">Entrar</button>
        <button class="cerrar" onclick="cerrarLogin()">Cerrar</button>
        <p id="userStatus"></p>
    </div>
</div>

<section class="controls">
    <select id="categoryFilter" onchange="filtrarCategoria()">
        <option value="all">Todas las categorías</option>
        <option value="novela">Novela</option>
        <option value="fantasia">Fantasía</option>
        <option value="historia">Historia</option>
    </select>

    <button onclick="ordenarPrecio()">Ordenar por precio ↑</button>
</section>

<section id="productGrid" class="grid"></section>

<footer class="footer">
    <div class="footer-content">
        <p>📚 Librería Lemos — Tu rincón de lectura</p>
        <p>© 2026 Todos los derechos reservados</p>
    </div>
</footer>
  <script src="java.js"></script>
</body>
</html>
